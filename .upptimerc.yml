# Change these first
owner: deblx # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository

sites:
  - name: Deblx
    url: https://www.deblx.com
    assignees:
      - swaiist
  - name: Deblx News
    url: https://news.deblx.com
    assignees:
      - swaiist

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname:
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Deblx Status
  introTitle: "**Deblx** System Status"
  introMessage: Live status and uptime history for Deblx services.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

i18n:
  footer: >
    [Imprint](https://deblx.com/imprint) | [Privacy Policy](https://deblx.com/privacy-policy)<br>
    This page is [open source]($REPO), powered by [Upptime](https://upptime.js.org/)<br>
    Hosted via GitHub Pages, monitored via GitHub Actions

